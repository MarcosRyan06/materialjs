<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aula 03</title>
</head>
<body>
    



    <script>

        //exercício 1
        var pessoa = prompt("Digite seu nome: ");
        window.alert("Olá " + pessoa);

        var hora = Number(prompt("Digite um horario"));

        if(hora <= 12){
            document.write("Bom Dia " + pessoa);
        }else if(hora > 12 && hora < 18){
            document.write("Boa Tarde " + pessoa);
        }else{
            document.write("Boa noite " + pessoa);
        }



    </script>
</body>
</html>
